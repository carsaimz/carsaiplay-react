name: 🚀 Release (APK + AAB)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (ex: v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi
          echo "version_code=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_VERSION: ${{ steps.version.outputs.tag }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}

      - name: Add Android platform
        run: npx cap add android

      - name: Copy android configs
        run: |
          cp android-configs/strings.xml android/app/src/main/res/values/strings.xml
          cp android-configs/colors.xml  android/app/src/main/res/values/colors.xml
          cp android-configs/styles.xml  android/app/src/main/res/values/styles.xml

      - name: Capacitor sync
        run: npx cap sync android

      - name: Set version in build.gradle
        working-directory: android
        run: |
          VERSION_NAME="${{ steps.version.outputs.tag }}"
          VERSION_NAME="${VERSION_NAME#v}"
          VERSION_CODE=${{ steps.version.outputs.version_code }}
          sed -i "s/versionCode .*/versionCode $VERSION_CODE/" app/build.gradle
          sed -i "s/versionName .*/versionName \"$VERSION_NAME\"/" app/build.gradle

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Build Release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Build Release AAB
        working-directory: android
        run: |
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Rename outputs
        run: |
          TAG=${{ steps.version.outputs.tag }}
          cp android/app/build/outputs/apk/release/app-release.apk   carsaiplay-${TAG}.apk
          cp android/app/build/outputs/bundle/release/app-release.aab carsaiplay-${TAG}.aab

      - name: Generate changelog
        id: changelog
        run: |
          if git describe --tags --abbrev=0 HEAD^ 2>/dev/null; then
            PREV=$(git describe --tags --abbrev=0 HEAD^)
            LOG=$(git log ${PREV}..HEAD --pretty=format:"- %s" --no-merges | head -30)
          else
            LOG=$(git log --pretty=format:"- %s" --no-merges | head -30)
          fi
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "CarsaiPlay ${{ steps.version.outputs.tag }}"
          body: |
            ## 📦 CarsaiPlay ${{ steps.version.outputs.tag }}

            ### 📝 Alterações
            ${{ steps.changelog.outputs.log }}

            ---
            ### 📲 Instalação
            - **APK** → transferir e instalar directamente no Android
            - **AAB** → para publicar na Google Play Store

            ### ⚙️ Requisitos
            - Android 7.0+ (API 24)
          files: |
            carsaiplay-${{ steps.version.outputs.tag }}.apk
            carsaiplay-${{ steps.version.outputs.tag }}.aab
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
