name: ✅ Checks (PR)

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint-build:
    name: Lint & Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: https://api.example.com/api/v1
